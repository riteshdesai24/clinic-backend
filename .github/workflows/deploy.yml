name: CI/CD - Clinic Backend

on:
  push:
    branches:
      - main

jobs:

  # 🔹 STEP 1: BUILD + TEST
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          node --check index.js
          node --check controllers/*.js || true
          node --check middlewares/*.js || true

  # 🔹 STEP 2: DEPLOY (ONLY IF BUILD SUCCESS)
  deploy:
    needs: build   # 🔥 important
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/clinic-backend
            git pull origin main
            npm install
            pm2 restart index || pm2 start index.js